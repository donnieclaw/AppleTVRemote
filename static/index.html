<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple TV 遥控器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #000; --surface: rgba(255,255,255,0.06); --surface-hover: rgba(255,255,255,0.12);
            --border: rgba(255,255,255,0.10); --text: #f5f5f7; --text-dim: rgba(255,255,255,0.45);
            --accent: #0a84ff; --red: #ff453a; --green: #30d158;
            --remote-bg: linear-gradient(170deg, #2a2a2e 0%, #1c1c1e 40%, #111113 100%);
            --btn-bg: rgba(255,255,255,0.08); --btn-pressed: rgba(255,255,255,0.18);
            --pad-size: 220px;
        }

        html, body { height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); overflow: hidden; }

        #app {
            display: flex; flex-direction: column; align-items: center; height: 100vh;
            background: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(10,132,255,0.12) 0%, transparent 60%), #000;
        }

        /* Status & Device */
        #statusbar { width: 100%; max-width: 320px; display: flex; justify-content: space-between; padding: 0 10px 4px; font-size: 12px; font-weight: 600; color: var(--text-dim); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; display: inline-block; transition: background 0.3s; }
        .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.error { background: var(--red); }
        
        #devicebar { width: 100%; max-width: 320px; padding: 0 10px 4px; display: flex; align-items: center; gap: 10px; }
        #device-name { flex: 1; font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #now-playing-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--text-dim); cursor: default; }
        
        .header-actions { display: flex; gap: 8px; }
        .icon-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--surface); border: none; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn:active { background: var(--surface-hover); color: #fff; }

        /* Remote Body */
        #remote {
            width: 100%; max-width: 320px; background: var(--remote-bg); border-radius: 36px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            padding: 30px 28px 35px; position: relative;
        }

        /* Clickpad (Physics areas) */
        #clickpad-wrap { width: var(--pad-size); height: var(--pad-size); margin: 0 auto 25px; position: relative; }
        #clickpad { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #3a3a3c, #1c1c1e 75%); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        
        .dir-area { position: absolute; z-index: 5; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
        .dir-area:active { background: rgba(255,255,255,0.05); }
        
        #area-up { top: 0; left: 20%; width: 60%; height: 35%; }
        #area-down { bottom: 0; left: 20%; width: 60%; height: 35%; }
        #area-left { left: 0; top: 20%; width: 35%; height: 60%; }
        #area-right { right: 0; top: 20%; width: 35%; height: 60%; }
        
        #center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #3a3a3c, #252527);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; z-index: 10;
        }
        #center-btn:active { transform: translate(-50%, -50%) scale(0.94); background: #333; }

        /* Buttons */
        .btn-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
        .rbtn { flex: 1; height: 55px; border-radius: 18px; background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--text); }
        .rbtn:active { background: var(--btn-pressed); transform: scale(0.95); }
        .rbtn span { font-size: 9px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0 0 20px; }
        
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,30,32,0.95); padding: 12px 24px; border-radius: 25px; font-size: 14px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 200; border: 1px solid rgba(255,255,255,0.15); }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
        .card { background: #1c1c1e; border: 1px solid rgba(255,255,255,0.12); border-radius: 28px; padding: 32px 28px; width: 100%; max-width: 400px; }
        .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-secondary { width: 100%; background: var(--surface); color: #fff; border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .dev-item { background: rgba(255,255,255,0.04); padding: 14px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.06); }
        .dev-item:hover { background: rgba(255,255,255,0.08); }
        
        /* Keyboard Sync (Centered) */
        #keyboard-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 150; }
        #keyboard-card { background: rgba(28,28,30,0.9); border: 1px solid rgba(255,255,255,0.15); border-radius: 32px; padding: 35px 30px; width: 100%; max-width: 360px; box-shadow: 0 60px 120px rgba(0,0,0,1); text-align: center; }
        #keyboard-input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 16px 20px; color: #fff; font-size: 19px; outline: none; margin-top: 25px; transition: border-color 0.2s; }
        #keyboard-input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

<div id="app">
    <div id="statusbar">
        <div style="display:flex;align-items:center;gap:6px">
            <span class="status-dot error" id="conn-dot"></span>
            <span id="conn-label">连接中...</span>
        </div>
        <span id="time-display">00:00</span>
    </div>

    <div id="devicebar">
        <div id="device-name">Apple TV</div>
        <div id="now-playing-pill">— 未连接 —</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="showKeyboard('', true)" id="kb-trigger" style="display:none;"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 5H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2zM6 9h2v2H6V9zm0 4h2v2H6v-2zm4-4h2v2h-2V9zm0 4h2v2h-2v-2zm4-4h2v2h-2V9zm0 4h2v2h-2v-2zm4-4h2v2h-2V9zm0 4h2v2h-2v-2zM8 17h8v-1H8v1z"/></svg></button>
            <button class="icon-btn" onclick="openWizard()">⚙️</button>
        </div>
    </div>

    <div id="remote">
        <div id="clickpad-wrap">
            <div id="clickpad">
                <div class="dir-area" id="area-up" onclick="sendCommand('up')"></div>
                <div class="dir-area" id="area-down" onclick="sendCommand('down')"></div>
                <div class="dir-area" id="area-left" onclick="sendCommand('left')"></div>
                <div class="dir-area" id="area-right" onclick="sendCommand('right')"></div>
                <div id="center-btn" onclick="sendCommand('select')">OK</div>
            </div>
        </div>

        <div class="btn-row">
            <div class="rbtn" onclick="sendCommand('menu')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg><span>菜单</span></div>
            <div class="rbtn" onclick="sendCommand('home')"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.8"><path d="M2 12.3a1 1 0 0 1 0-.6C3.4 7.5 7.4 4.5 12 4.5c4.6 0 8.6 3 10 7.2.1.2.1.4 0 .6-1.4 4.1-5.4 7.2-10 7.2-4.6 0-8.6-3-10-7.2z"/><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" fill="#000"/></svg><span>主屏幕</span></div>
        </div>
        <div class="divider"></div>
        <div class="btn-row">
            <div class="rbtn" onclick="sendCommand('play_pause')" style="flex:1; background: rgba(10,132,255,0.18);"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span>播放/暂停</span></div>
            <div class="rbtn" onclick="sendCommand('power')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg><span>待机</span></div>
        </div>
        <div class="btn-row">
            <div class="rbtn" onclick="sendCommand('volume_down')"><span style="font-size:18px;">－</span><span>音量</span></div>
            <div class="rbtn" onclick="sendCommand('volume_up')"><span style="font-size:18px;">＋</span><span>音量</span></div>
        </div>
    </div>
</div>

<div class="overlay" id="wizard-scan">
    <div class="card">
        <h2>🔍 发现 Apple TV</h2>
        <div id="device-list" style="max-height: 250px; overflow-y: auto; margin: 20px 0;">正在扫描...</div>
        <div style="display:flex; flex-wrap:wrap; gap:10px; font-size: 13px; align-items: center; margin-bottom: 20px;">
            <span style="color:var(--text-dim)">协议:</span>
            <label style="cursor:pointer;"><input type="radio" name="proto" value="MRP"> MRP</label>
            <label style="cursor:pointer;"><input type="radio" name="proto" value="Companion" checked> Companion</label>
            <label style="cursor:pointer;"><input type="radio" name="proto" value="AirPlay"> AirPlay</label>
        </div>
        <button class="btn-secondary" onclick="closeWizard()">取消</button>
    </div>
</div>

<div class="overlay" id="wizard-pin">
        <div class="card">
            <h2>🔑 输入 PIN 码</h2>
            <p style="font-size:13px; color:var(--text-dim); margin: 15px 0;">请在电视屏幕上查看 4 位代码。</p>
            <input type="text" id="pin-input" class="pin-input" style="width:100%; border-bottom: 2px solid var(--accent); background:rgba(255,255,255,0.05); color:#fff !important; font-size:32px; text-align:center; outline:none; letter-spacing:8px; margin-bottom:25px;" maxlength="4" placeholder="----">
            <button class="btn-primary" onclick="submitPin()">确认配对</button>
            <button class="btn-secondary" onclick="closeWizard()">取消</button>
        </div>
</div>

<div class="overlay" id="keyboard-overlay">
    <div id="keyboard-card">
        <div style="font-size: 32px; margin-bottom: 5px;">⌨️</div>
        <h2 id="kb-title">正在同步...</h2>
        <input type="text" id="keyboard-input" placeholder="键入文字并发起同步..." autocomplete="off">
        <div style="font-size: 11px; color: var(--text-dim); margin-top: 15px; letter-spacing: 1px;">ESC 退出 • ENTER 确认</div>
    </div>
</div>

<div id="toast"></div>

<script>
const toast = (m) => { const e=document.getElementById('toast'); e.innerText=m; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2000); };
const closeWizard = () => document.querySelectorAll('.overlay').forEach(o=>o.style.display='none');

// WebSocket Init
let ws = null, kbActive = false, kbManual = false, typingTimer = null;

function initWS() {
    ws = new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws`);
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'keyboard_status') {
            document.getElementById('kb-title').innerText = d.display_name || '远程输入';
            if (!kbManual) { d.active ? showKeyboard(d.text) : hideKeyboard(); }
        } else if (d.type === 'text_sync') {
            const input = document.getElementById('keyboard-input');
            if (document.activeElement !== input) input.value = d.text || '';
        } else if (d.type === 'playing_update') {
            document.getElementById('now-playing-pill').innerText = d.title || '— 未在播放 —';
        }
    };
    ws.onclose = () => { setTimeout(initWS, 3000); };
}

// Keyboard Input Handling (Debounce & Enter Logic)
function showKeyboard(txt, manual = false) {
    kbActive = true; kbManual = manual;
    document.getElementById('keyboard-overlay').style.display = 'flex';
    const input = document.getElementById('keyboard-input');
    input.value = txt || '';
    setTimeout(() => input.focus(), 150);
}

function hideKeyboard() { kbActive = false; kbManual = false; document.getElementById('keyboard-overlay').style.display = 'none'; }

document.getElementById('keyboard-input').addEventListener('input', (e) => {
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'set_text', text: e.target.value }));
    }, 300);
});

document.getElementById('keyboard-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'set_text', text: e.target.value }));
        hideKeyboard();
        e.stopPropagation(); // 阻止冒泡到全局监听器
    } else if (e.key === 'Escape') {
        hideKeyboard();
        e.stopPropagation();
    }
});

// Global Shortcuts (Newly added in v1.3)
window.addEventListener('keydown', (e) => {
    // 如果正在输入文字（同步弹窗或 PIN 码弹窗），则不触发遥控快捷键
    if (kbActive || document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
        // 例外：允许在输入状态下，按 Shift+T 切换开启（即使已经开启也显示，用于手动触发）
        if (e.key === 'T' && e.shiftKey) {
            showKeyboard('', true);
            e.preventDefault();
        }
        return;
    }

    switch(e.key) {
        case 'ArrowUp': sendCommand('up'); e.preventDefault(); break;
        case 'ArrowDown': sendCommand('down'); e.preventDefault(); break;
        case 'ArrowLeft': sendCommand('left'); e.preventDefault(); break;
        case 'ArrowRight': sendCommand('right'); e.preventDefault(); break;
        case 'Enter': sendCommand('select'); e.preventDefault(); break;
        case 'Escape':
        case 'Backspace': sendCommand('menu'); e.preventDefault(); break;
        case ' ': sendCommand('play_pause'); e.preventDefault(); break;
        case 'T': if (e.shiftKey) { showKeyboard('', true); e.preventDefault(); } break;
    }
});

// Commands
async function sendCommand(action) {
    try { await fetch('/api/command', { method: 'POST', headers: {'Content-Type':'application/json'}, body: json=JSON.stringify({action}) }); }
    catch(e) { toast('发送失败'); }
}

async function checkStatus() {
    try {
        const r = await fetch('/api/status');
        const d = await r.json();
        document.getElementById('conn-dot').className = 'status-dot' + (d.connected ? ' connected' : ' error');
        document.getElementById('conn-label').innerText = d.connected ? '已连接' : '已断开';
        if (d.device_name) document.getElementById('device-name').innerText = d.device_name;
        document.getElementById('kb-trigger').style.display = d.keyboard_ready ? 'flex' : 'none';
    } catch(e) {}
}

// Pairing
async function openWizard() {
    document.getElementById('wizard-scan').style.display = 'flex';
    document.getElementById('device-list').innerHTML = '正在扫描...';
    try {
        const r = await fetch('/api/scan', { method: 'POST' });
        const d = await r.json();
        let h = '';
        d.devices.forEach(dev => {
            h += `<div class="dev-item" onclick="startPair('${dev.id}')"><b>${dev.name}</b><br><small>${dev.address}</small></div>`;
        });
        document.getElementById('device-list').innerHTML = h || '未发现设备';
    } catch(e) { document.getElementById('device-list').innerText = '搜索失败'; }
}

async function startPair(id) {
    const proto = document.querySelector('input[name="proto"]:checked').value;
    toast(`正在发起 ${proto} 配对...`);
    try {
        const r = await fetch('/api/pair/start', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({device_id:id, protocol:proto}) });
        if (r.ok) { closeWizard(); document.getElementById('wizard-pin').style.display = 'flex'; document.getElementById('pin-input').focus(); }
        else toast('配对失败');
    } catch(e) { toast('请求失败'); }
}

async function submitPin() {
    const pin = document.getElementById('pin-input').value;
    try {
        const r = await fetch('/api/pair/pin', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({pin}) });
        if (r.ok) { toast('配对成功！'); closeWizard(); checkStatus(); }
        else toast('验证失败');
    } catch(e) { toast('请求失败'); }
}

// Init
window.onload = () => { initWS(); checkStatus(); setInterval(checkStatus, 5000); };
setInterval(() => { const d=new Date(); document.getElementById('time-display').innerText=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }, 1000);
</script>
</body>
</html>
